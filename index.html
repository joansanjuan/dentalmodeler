<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DentalModeler — 3D STL Editor</title>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
      "three-mesh-bvh": "https://cdn.jsdelivr.net/npm/three-mesh-bvh@0.9.8/build/index.module.js",
      "three-bvh-csg": "https://cdn.jsdelivr.net/npm/three-bvh-csg@0.0.17/build/index.module.js"
    }
  }
  </script>

  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

<header class="header">
  <div class="container header__inner">
    <a class="logo-text" href="#">Dental<span>Modeler</span></a>
  </div>
</header>

<main class="main">
  <section class="container">

    <div class="card">
      <div class="editor-layout">

        <!-- Left: viewer -->
        <div class="editor-viewer">
          <div id="dropZone" class="drop-zone">
            <strong>Drop an STL file here</strong>
            or click to browse
            <input type="file" id="stlInput" accept=".stl" style="display:none" />
          </div>
          <div id="viewer"></div>
          <p id="info">Load an STL to get started.</p>
        </div>

        <!-- Right: controls panel -->
        <aside class="editor-panel">

          <div class="panel-section">
            <span class="section-label">Selection &amp; Paint</span>
            <label class="control">
              <span>Brush radius</span>
              <div class="slider-row">
                <input type="range" id="brushRadiusRange" min="0.1" max="5" step="0.1" value="1" disabled />
                <span class="slider-val" id="brushRadiusVal">1.00</span>
              </div>
            </label>
            <div class="toolbar">
              <button id="btnClear" class="btn--icon" type="button" title="Clear selection" disabled>
                <i data-lucide="eraser"></i>
              </button>
              <button id="btnUndo" class="btn--icon" type="button" title="Undo" disabled>
                <i data-lucide="undo-2"></i>
              </button>
              <div class="toolbar__sep"></div>
              <button id="btnClose" class="btn--icon" type="button" title="Close holes (no selection = all open holes)" disabled>
                <i data-lucide="plug"></i>
              </button>
              <button id="btnDelete" class="btn--icon btn--danger" type="button" title="Delete selection" disabled>
                <i data-lucide="scissors"></i>
              </button>
              <div class="toolbar__sep"></div>
              <button id="btnDownload" class="btn--icon" type="button" title="Download STL" disabled>
                <i data-lucide="download"></i>
              </button>
            </div>
          </div>

          <div class="panel-section">
            <span class="section-label">Extrude to plane</span>
            <label class="control">
              <span>Axis</span>
              <select id="extrudeAxisSelect" disabled>
                <option value="y" selected>Y</option>
                <option value="z">Z</option>
                <option value="x">X</option>
              </select>
            </label>
            <label class="control">
              <span>Position</span>
              <div class="slider-row">
                <input type="range" id="extrudePosRange" min="-50" max="50" step="0.1" value="-20" disabled />
                <span class="slider-val" id="extrudePosVal">-20.00</span>
              </div>
            </label>
            <button id="btnExtrude" class="btn btn--ghost btn--full" type="button" disabled>
              <i data-lucide="move-vertical"></i> Extrude to plane
            </button>
          </div>

          <div class="panel-section">
            <span class="section-label">3D Text — Emboss</span>
            <label class="control">
              <span>Text</span>
              <input type="text" id="textInput" value="PATIENT NAME" />
            </label>
            <div class="control">
              <div class="toolbar">
                <button id="btnPickTextPoint" class="btn--icon" type="button" title="Pick placement point on mesh" disabled>
                  <i data-lucide="map-pin"></i>
                </button>
                <span id="pickInfo" class="pick-info">No point picked</span>
              </div>
            </div>
            <label class="control">
              <span>Text size</span>
              <div class="slider-row">
                <input type="range" id="sizeRange" min="0.5" max="5" step="0.1" value="2" disabled />
                <span class="slider-val" id="sizeVal">2.0</span>
              </div>
            </label>
            <label class="control">
              <span>Depth</span>
              <div class="slider-row">
                <input type="range" id="depthRange" min="0.1" max="2" step="0.1" value="0.5" disabled />
                <span class="slider-val" id="depthVal">0.5</span>
              </div>
            </label>
            <div class="toolbar">
              <button id="btnApplyText" class="btn--icon" type="button" title="Apply emboss at hover position" disabled>
                <i data-lucide="wand-2"></i>
              </button>
              <button id="btnReset" class="btn--icon" type="button" title="Reset to original" disabled>
                <i data-lucide="rotate-ccw"></i>
              </button>
            </div>
          </div>

        </aside>

      </div><!-- /editor-layout -->
    </div><!-- /card -->

  </section>
</main>

<script>lucide.createIcons();</script>
<script type="module" src="js/select.js"></script>
</body>
</html>

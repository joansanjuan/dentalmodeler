<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DentalModeler — 3D STL Editor</title>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
      "three-mesh-bvh": "https://cdn.jsdelivr.net/npm/three-mesh-bvh@0.9.8/build/index.module.js",
      "three-bvh-csg": "https://cdn.jsdelivr.net/npm/three-bvh-csg@0.0.17/build/index.module.js"
    }
  }
  </script>

  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

<header class="header">
  <div class="container header__inner">
    <a class="logo-text" href="#">Dental<span>Modeler</span></a>
  </div>
</header>

<main class="main">
  <section class="container">

    <div class="card">
      <div class="editor-layout">

        <!-- Left: viewer -->
        <div class="editor-viewer">
          <div id="dropZone" class="drop-zone">
            <strong>Drop an STL or OBJ file here</strong>
            or click to browse
            <input type="file" id="stlInput" accept=".stl,.obj" style="display:none" />
          </div>
          <div id="viewer"></div>
          <p id="info">Load an STL to get started.</p>
        </div>

        <!-- Right: controls panel -->
        <aside class="editor-panel">

          <!-- Mode switcher -->
          <div class="mode-switcher">
            <button class="mode-btn active" data-mode="auto" type="button" title="Auto base">
              <i data-lucide="wand-2"></i>
              <span>Auto</span>
            </button>
            <button class="mode-btn" data-mode="manual" type="button" title="Manual tools">
              <i data-lucide="scissors"></i>
              <span>Manual</span>
            </button>
            <button class="mode-btn" data-mode="text" type="button" title="3D text emboss">
              <i data-lucide="type"></i>
              <span>Text</span>
            </button>
          </div>

          <!-- AUTO panel -->
          <div class="mode-panel" data-mode="auto">
            <div class="panel-section">
              <p class="mode-hint">Automatically extrudes the model to a flat base plane aligned with the occlusal.</p>
              <button id="btnAutoBase" class="btn btn--full" type="button" disabled>
                <i data-lucide="wand-2"></i> Auto base
              </button>
            </div>
          </div>

          <!-- MANUAL panel -->
          <div class="mode-panel" data-mode="manual" style="display:none">

            <div class="panel-section">
              <span class="section-label">Plane</span>
              <label class="control">
                <span>Type</span>
                <select id="planeTypeSelect" disabled>
                  <option value="none">— None —</option>
                  <option value="y">Y axis</option>
                  <option value="z">Z axis</option>
                  <option value="x">X axis</option>
                  <option value="occlusal" selected>Occlusal</option>
                </select>
              </label>
              <label class="control" id="axisPositionControl" style="display:none">
                <span>Position</span>
                <div class="slider-row">
                  <input type="range" id="extrudePosRange" min="-50" max="50" step="0.1" value="-20" disabled />
                  <span class="slider-val" id="extrudePosVal">-20.00</span>
                </div>
              </label>
              <button id="btnDetectPlane" class="btn btn--ghost btn--full" type="button" disabled>
                <i data-lucide="scan-line"></i> Auto-detect
              </button>
              <label class="control" id="planeControls" style="display:none">
                <span>Offset</span>
                <div class="slider-row">
                  <input type="range" id="planeOffsetRange" min="-50" max="50" step="0.1" value="0" />
                  <span class="slider-val" id="planeOffsetVal">0.0</span>
                </div>
              </label>
              <button id="btnExtrude" class="btn btn--ghost btn--full" type="button" disabled>
                <i data-lucide="move-vertical"></i> Extrude to plane
              </button>
            </div>

            <div class="panel-section">
              <span class="section-label">Crop &amp; Paint</span>
              <label class="control">
                <span>Brush radius</span>
                <div class="slider-row">
                  <input type="range" id="brushRadiusRange" min="0.1" max="5" step="0.1" value="1" disabled />
                  <span class="slider-val" id="brushRadiusVal">1.00</span>
                </div>
              </label>
              <div class="toolbar">
                <button id="btnUndo" class="btn--icon" type="button" title="Undo (Ctrl+Z)" disabled>
                  <i data-lucide="undo-2"></i>
                </button>
                <button id="btnRedo" class="btn--icon" type="button" title="Redo (Ctrl+Y)" disabled>
                  <i data-lucide="redo-2"></i>
                </button>
                <div class="toolbar__sep"></div>
                <button id="btnClose" class="btn--icon" type="button" title="Close holes" disabled style="display:none">
                  <i data-lucide="plug"></i>
                </button>
                <button id="btnDelete" class="btn--icon btn--danger" type="button" title="Delete selection (Del)" disabled>
                  <i data-lucide="scissors"></i>
                </button>
              </div>
            </div>

            <div class="panel-section" id="segSection" style="display:none">
              <span class="section-label">Segmentation</span>
              <button id="btnLoadSeg" class="btn btn--ghost btn--full" type="button">
                <i data-lucide="tag"></i> Load JSON labels
              </button>
              <input type="file" id="segInput" accept=".json" style="display:none" />
              <p id="segInfo" class="pick-info" style="margin-top:4px">No segmentation loaded</p>
            </div>

          </div><!-- /manual panel -->

          <!-- TEXT panel -->
          <div class="mode-panel" data-mode="text" style="display:none">
            <div class="panel-section">
              <span class="section-label">3D Text — Emboss</span>
              <label class="control">
                <span>Text</span>
                <input type="text" id="textInput" value="PATIENT NAME" />
              </label>
              <button id="btnUpdateTextPreview" class="btn btn--ghost btn--full" type="button" style="display:none">
                <i data-lucide="refresh-cw"></i> Update preview
              </button>
              <div class="control">
                <div class="toolbar">
                  <button id="btnPickTextPoint" class="btn--icon" type="button" title="Pick placement point on mesh" disabled>
                    <i data-lucide="map-pin"></i>
                  </button>
                  <span id="pickInfo" class="pick-info">No point picked</span>
                </div>
              </div>
              <label class="control">
                <span>Text size</span>
                <div class="slider-row">
                  <input type="range" id="sizeRange" min="0.5" max="5" step="0.1" value="2" disabled />
                  <span class="slider-val" id="sizeVal">2.0</span>
                </div>
              </label>
              <label class="control">
                <span>Depth</span>
                <div class="slider-row">
                  <input type="range" id="depthRange" min="0.1" max="2" step="0.1" value="0.5" disabled />
                  <span class="slider-val" id="depthVal">0.5</span>
                </div>
              </label>
              <div class="toolbar">
                <button id="btnApplyText" class="btn--icon" type="button" title="Apply emboss" disabled>
                  <i data-lucide="wand-2"></i>
                </button>
                <button id="btnReset" class="btn--icon" type="button" title="Reset to original" disabled>
                  <i data-lucide="rotate-ccw"></i>
                </button>
              </div>
            </div>
          </div><!-- /text panel -->

          <!-- Spacer pushes download to bottom -->
          <div class="panel-spacer"></div>

          <!-- Download — always at bottom -->
          <div class="panel-section panel-section--download">
            <button id="btnDownload" class="btn btn--ghost btn--full" type="button" disabled>
              <i data-lucide="save"></i> Download STL
            </button>
          </div>

        </aside>

      </div><!-- /editor-layout -->
    </div><!-- /card -->

  </section>
</main>

<div id="spinnerOverlay" class="spinner-overlay">
  <div class="spinner"></div>
</div>

<script>lucide.createIcons();</script>
<script type="module" src="js/select.js"></script>
</body>
</html>
